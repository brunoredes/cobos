# .github/workflows/deploy.yml
#
# Build the Vite app and deploy to GitHub Pages.
#
# Triggers:
#   - Every push to `main`
#   - Manual trigger via the "Actions" tab (workflow_dispatch)
#
# Required GitHub repository settings:
#   Settings → Pages → Source → "GitHub Actions"

name: Build & Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Grant the GITHUB_TOKEN the minimum scopes required by
# actions/deploy-pages to create a Pages deployment.
permissions:
  contents: read
  pages:    write
  id-token: write

# Allow only one concurrent deployment.
# In-progress deployments are NOT cancelled so we never leave
# the site in a half-deployed state; the new run is queued instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Passed to vite.config.js → resolveBase() so the correct
          # /<repo>/ base path is embedded into the bundle.
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire dist/ directory produced by `vite build`.
          path: dist

  # ---------------------------------------------------------------------------
  # Job 2: deploy (runs only after build succeeds)
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
